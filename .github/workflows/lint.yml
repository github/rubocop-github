name: lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # pin@v1.320.0
        with:
          bundler-cache: true

      - name: lint
        run: script/lint
