name: lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # pin@v1.305.0
        with:
          bundler-cache: true

      - name: lint
        run: script/lint
