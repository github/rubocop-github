name: lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # pin@v1.315.0
        with:
          bundler-cache: true

      - name: lint
        run: script/lint
