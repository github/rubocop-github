name: lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: ruby/setup-ruby@19a43a6a2428d455dbd1b85344698725179c9d8c # pin@v1.289.0
        with:
          bundler-cache: true

      - name: lint
        run: script/lint
