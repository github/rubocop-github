name: lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: ruby/setup-ruby@c515ec17f69368147deb311832da000dd229d338 # pin@v1.297.0
        with:
          bundler-cache: true

      - name: lint
        run: script/lint
