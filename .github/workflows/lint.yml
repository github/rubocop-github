name: lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: ruby/setup-ruby@a99ac844649df2596b52b4db087cfa0881b172af # pin@v1.311.0
        with:
          bundler-cache: true

      - name: lint
        run: script/lint
